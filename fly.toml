app = "trello-mcp-server"
primary_region = "lhr"

[build]
  # Uses nixpacks auto-detection; requirements.txt is enough

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[env]
  # Secrets are injected via: flyctl secrets set TRELLO_API_KEY=... TRELLO_TOKEN=... MCP_AUTH_TOKEN=...
  PORT = "8000"
